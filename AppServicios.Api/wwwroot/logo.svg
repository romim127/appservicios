<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Logo AppServicios Premium">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2E4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1B2E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F76B1C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="proGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="93" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.08"/>
  <path d="M30,130 Q100,60 170,130" fill="none" stroke="#FFFFFF" stroke-width="0.6" stroke-opacity="0.06"/>
  <path d="M20,145 Q100,50 180,145" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.04"/>

  <circle cx="57" cy="62" r="13" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <path d="M38,105 Q38,84 57,82 Q76,84 76,105 L76,118 Q76,122 72,122 L42,122 Q38,122 38,118 Z" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <path d="M76,92 Q92,95 98,100" fill="none" stroke="url(#clientGrad)" stroke-width="5" stroke-linecap="round"/>

  <circle cx="143" cy="62" r="13" fill="url(#proGrad)" filter="url(#shadow)"/>
  <path d="M124,105 Q124,84 143,82 Q162,84 162,105 L162,118 Q162,122 158,122 L128,122 Q124,122 124,118 Z" fill="url(#proGrad)" filter="url(#shadow)"/>
  <path d="M124,92 Q108,95 102,100" fill="none" stroke="url(#proGrad)" stroke-width="5" stroke-linecap="round"/>

  <ellipse cx="100" cy="101" rx="12" ry="8" fill="url(#bridgeGrad)" filter="url(#glow)"/>
  <line x1="78" y1="100" x2="122" y2="100" stroke="url(#bridgeGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

  <rect x="79" y="133" width="42" height="28" rx="4" ry="4" fill="#F5A623" filter="url(#shadow)"/>
  <path d="M90,133 L90,128 Q90,124 95,124 L105,124 Q110,124 110,128 L110,133" fill="none" stroke="#F5A623" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="79" y1="147" x2="121" y2="147" stroke="#E08C00" stroke-width="2" opacity="0.6"/>
  <rect x="93" y="143" width="14" height="8" rx="2" fill="#E08C00"/>

  <circle cx="148" cy="148" r="14" fill="#0D1B2E" stroke="#81C784" stroke-width="2.5"/>
  <polyline points="141,148 146,154 156,141" fill="none" stroke="#81C784" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <circle cx="100" cy="37" r="2.5" fill="#F5A623" opacity="0.9"/>
  <circle cx="112" cy="43" r="1.6" fill="#F5A623" opacity="0.5"/>
  <circle cx="88" cy="43" r="1.6" fill="#F5A623" opacity="0.5"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="url(#bridgeGrad)" stroke-width="1.5" opacity="0.4"/>
</svg>
