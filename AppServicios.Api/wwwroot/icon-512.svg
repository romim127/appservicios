<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="AppServicios icon 512">
<defs>
<linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#1A2E4A"/>
<stop offset="100%" style="stop-color:#0D1B2E"/>
</linearGradient>
<linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#4FC3F7"/>
<stop offset="100%" style="stop-color:#0288D1"/>
</linearGradient>
<linearGradient id="proGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#81C784"/>
<stop offset="100%" style="stop-color:#388E3C"/>
</linearGradient>
<linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#F5A623"/>
<stop offset="100%" style="stop-color:#F76B1C"/>
</linearGradient>
<linearGradient id="roadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#29B6F6;stop-opacity:0.15"/>
<stop offset="100%" style="stop-color:#0277BD;stop-opacity:0.15"/>
</linearGradient>
<linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#FF6B6B"/>
<stop offset="100%" style="stop-color:#D32F2F"/>
</linearGradient>
<radialGradient id="pinAShadow" cx="50%" cy="80%" r="50%">
<stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:0.5"/>
<stop offset="100%" style="stop-color:#4FC3F7;stop-opacity:0"/>
</radialGradient>
<radialGradient id="pinBShadow" cx="50%" cy="80%" r="50%">
<stop offset="0%" style="stop-color:#81C784;stop-opacity:0.5"/>
<stop offset="100%" style="stop-color:#81C784;stop-opacity:0"/>
</radialGradient>
<filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
<feGaussianBlur stdDeviation="3" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur stdDeviation="6" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="shadow" x="-15%" y="-15%" width="140%" height="150%">
<feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/>
</filter>
<filter id="pinShadow" x="-40%" y="-30%" width="180%" height="200%">
<feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#FF6B6B" flood-opacity="0.45"/>
</filter>
<filter id="routeGlow" x="-20%" y="-80%" width="140%" height="260%">
<feGaussianBlur stdDeviation="4" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="mapGlow" x="-10%" y="-10%" width="120%" height="120%">
<feGaussianBlur stdDeviation="1.5" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<clipPath id="circleClip">
<circle cx="100" cy="100" r="97"/>
</clipPath>
<style>
.routeDash {
stroke-dasharray: 8 5;
animation: dash 1.6s linear infinite;
}
@keyframes dash { to { stroke-dashoffset: -26; } }
.globeRotate {
animation: globeSpin 18s linear infinite;
transform-origin: 100px 100px;
}
@keyframes globeSpin {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}
.globeRotateSlow {
animation: globeSpinSlow 28s linear infinite reverse;
transform-origin: 100px 100px;
}
@keyframes globeSpinSlow {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}
.pulseA {
animation: pulseA 2.2s ease-in-out infinite;
transform-origin: 42px 74px;
}
@keyframes pulseA {
0%,100%{ opacity:.35; r:11; }
50% { opacity:.07; r:15; }
}
.pulseB {
animation: pulseB 2.2s ease-in-out infinite;
animation-delay:.7s;
transform-origin: 158px 74px;
}
@keyframes pulseB {
0%,100%{ opacity:.35; r:11; }
50% { opacity:.07; r:15; }
}
.ubiBounce {
animation: ubiBounce 2s ease-in-out infinite;
transform-origin: 100px 90px;
}
@keyframes ubiBounce {
0%,100%{ transform: translateY(0); }
50% { transform: translateY(-3px); }
}
.armLeft {
animation: armLeft 2s ease-in-out infinite;
transform-origin: 76px 92px;
}
@keyframes armLeft {
0%,100%{ transform: rotate(0deg); opacity:.85; }
50% { transform: rotate(-8deg); opacity:1; }
}
.armRight {
animation: armRight 2s ease-in-out infinite;
animation-delay:.2s;
transform-origin: 124px 92px;
}
@keyframes armRight {
0%,100%{ transform: rotate(0deg); opacity:.85; }
50% { transform: rotate(8deg); opacity:1; }
}
.handshake {
animation: hsPulse 2s ease-in-out infinite;
transform-origin: 100px 101px;
}
@keyframes hsPulse {
0%,100%{ transform: scale(1); opacity:1; }
50% { transform: scale(1.12); opacity:.8; }
}
.routeHalo {
animation: routeHalo 3s ease-in-out infinite;
}
@keyframes routeHalo {
0%,100%{ opacity:.12; }
50% { opacity:.24; }
}
</style>
</defs>
